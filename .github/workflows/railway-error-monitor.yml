name: Railway Error Monitor

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  check-railway-errors:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Fetch latest deployment
        id: deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "{ deployments(input: { projectId: \"e90342bb-5a40-4032-adc0-a79fe0c3648a\", serviceId: \"a9711ecf-3e9a-4d7b-b9c0-9ab3f9c95e05\", environmentId: \"8d3f28e4-ed41-4114-a857-1904e366c75d\" }, first: 1) { edges { node { id status } } } }"
            }')

          DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[0].node.id // empty')
          DEPLOYMENT_STATUS=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[0].node.status // empty')

          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "No deployment found or Railway API error"
            echo "raw_response=$RESPONSE"
            exit 1
          fi

          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "deployment_status=$DEPLOYMENT_STATUS" >> "$GITHUB_OUTPUT"
          echo "Deployment: $DEPLOYMENT_ID | Status: $DEPLOYMENT_STATUS"

      - name: Fetch and analyze logs
        id: logs
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          DEPLOYMENT_ID="${{ steps.deployment.outputs.deployment_id }}"

          LOGS=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ deploymentLogs(deploymentId: \\\"$DEPLOYMENT_ID\\\", limit: 500) { timestamp message severity } }\"}")

          # Extract messages; fall back to raw if jq fails
          LOG_LINES=$(echo "$LOGS" | jq -r '.data.deploymentLogs[] | "[\(.severity)] \(.timestamp) \(.message)"' 2>/dev/null) \
            || LOG_LINES=$(echo "$LOGS" | jq -r '.data.deploymentLogs[].message' 2>/dev/null) \
            || LOG_LINES="$LOGS"

          echo "$LOG_LINES" > /tmp/log_lines.txt

          ERROR_PATTERN='ERROR|FATAL|Exception|NullPointerException|StackOverflowError|OutOfMemoryError|Connection refused|Process exited with code [^0]'

          if echo "$LOG_LINES" | grep -qE "$ERROR_PATTERN"; then
            EXCERPT=$(echo "$LOG_LINES" | grep -E "$ERROR_PATTERN" | head -40)
            echo "has_errors=true" >> "$GITHUB_OUTPUT"
            {
              echo "error_excerpt<<DELIM"
              echo "$EXCERPT"
              echo "DELIM"
            } >> "$GITHUB_OUTPUT"
            echo "Errors found:"
            echo "$EXCERPT"
          else
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
            echo "No errors found in last 500 log lines."
          fi

      - name: Check for existing open issue
        id: dedup
        if: steps.logs.outputs.has_errors == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh issue list \
            --repo AlexBrusova/rehab \
            --state open \
            --label "railway-monitor" \
            --json number \
            --jq 'length')
          echo "open_count=$OPEN" >> "$GITHUB_OUTPUT"

      - name: Create issue for errors
        if: steps.logs.outputs.has_errors == 'true' && steps.dedup.outputs.open_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOYMENT_ID="${{ steps.deployment.outputs.deployment_id }}"
          DEPLOYMENT_STATUS="${{ steps.deployment.outputs.deployment_status }}"
          EXCERPT="${{ steps.logs.outputs.error_excerpt }}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          # Ensure label exists
          gh label create "railway-monitor" --repo AlexBrusova/rehab \
            --description "Auto-created by Railway Error Monitor" \
            --color "d93f0b" 2>/dev/null || true

          gh issue create \
            --repo AlexBrusova/rehab \
            --title "fix: Railway error in backend deployment ($DATE)" \
            --label "railway-monitor" \
            --body "## Railway Error Detected

**Deployment:** \`$DEPLOYMENT_ID\`
**Status:** \`$DEPLOYMENT_STATUS\`
**Detected at:** $DATE

## Error Excerpt

\`\`\`
$EXCERPT
\`\`\`

## Next Steps

1. Check [Railway dashboard](https://railway.app/project/e90342bb-5a40-4032-adc0-a79fe0c3648a) for full logs
2. Fix the root cause in \`backend/\`
3. Close this issue after the fix deploys successfully

*Auto-generated by [Railway Error Monitor](.github/workflows/railway-error-monitor.yml)*"

      - name: Comment on existing issue if still failing
        if: steps.logs.outputs.has_errors == 'true' && steps.dedup.outputs.open_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --repo AlexBrusova/rehab \
            --state open \
            --label "railway-monitor" \
            --json number \
            --jq '.[0].number')
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          EXCERPT="${{ steps.logs.outputs.error_excerpt }}"

          gh issue comment "$ISSUE_NUMBER" \
            --repo AlexBrusova/rehab \
            --body "**Still failing** at $DATE

\`\`\`
$EXCERPT
\`\`\`"
